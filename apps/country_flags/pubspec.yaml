name: country_flags
description: Forever Free Country Flags — learn the flags of every country, free and offline.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  go_router: ^17.1.0
  shared_preferences: ^2.2.0
  url_launcher: ^6.2.0
  # NOTE: Cannot add the pub.dev `country_flags` package here — it conflicts
  # with this app's own package name (also `country_flags`). Flag rendering
  # approach (emoji vs. a different SVG package) will be resolved in Phase 3.
  shared_app_core:
    path: ../../packages/shared_app_core

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1B5E7B"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/data/
