  # ============================
  # NATO Alphabet - iOS Screenshots
  # ============================
  # Manual only — run this workflow when you need fresh App Store screenshots.
  # Downloads 6 PNG files as build artifacts. Takes ~20 min, no App Store creds.
  # Target device: iPhone 17 Pro Max (6.9" Display slot in App Store Connect).
  nato-alphabet-screenshots:
    name: NATO Alphabet - iOS Screenshots
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get shared package dependencies
        script: |
          cd $CM_BUILD_DIR/packages/shared_app_core
          flutter pub get

      - name: Get app dependencies
        script: |
          cd $CM_BUILD_DIR/apps/nato_alphabet
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd $CM_BUILD_DIR/apps/nato_alphabet/ios
          pod install

      - name: Boot iPhone 17 Pro Max simulator
        script: |
          set -euo pipefail

          # Shut down any leftover simulators from previous steps
          xcrun simctl shutdown all || true

          # Extract the UDID of the first available iPhone 17 Pro Max
          UDID=$(xcrun simctl list devices available \
            | grep 'iPhone 17 Pro Max' \
            | head -1 \
            | sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')

          if [ -z "$UDID" ]; then
            echo "ERROR: No 'iPhone 17 Pro Max' simulator found. Available devices:"
            xcrun simctl list devices available | grep -i iphone
            exit 1
          fi

          echo "Booting simulator UDID: $UDID"

          # Boot AND block until fully ready (single atomic command)
          xcrun simctl bootstatus "$UDID" -b

          # Open Simulator.app so Flutter's device discovery sees the booted device
          open -a Simulator
          sleep 3

          # Confirm Flutter can see it
          flutter devices

          # Persist UDID for the next step
          echo "SCREENSHOT_UDID=$UDID" >> $CM_ENV

      - name: Capture screenshots on iPhone 17 Pro Max simulator
        script: |
          cd $CM_BUILD_DIR/apps/nato_alphabet
          mkdir -p screenshots
          flutter drive \
            --driver  integration_test/test_driver/screenshots_driver.dart \
            --target  integration_test/screenshots_test.dart \
            --device-id "$SCREENSHOT_UDID"

      - name: Strip alpha channels (App Store rejects RGBA PNGs)
        script: |
          # flutter takeScreenshot() produces RGBA PNGs even when fully opaque.
          # App Store Connect rejects any PNG with an alpha channel.
          # Use ImageMagick (pre-installed on Codemagic) to strip alpha in-place.
          cd $CM_BUILD_DIR/apps/nato_alphabet/screenshots
          for f in *.png; do
            magick "$f" -alpha off "$f" 2>/dev/null || convert "$f" -alpha off "$f"
            echo "Stripped alpha: $f"
          done

      - name: Verify saved screenshots and their dimensions
        script: |
          echo "=== Saved screenshots ==="
          for f in $CM_BUILD_DIR/apps/nato_alphabet/screenshots/*.png; do
            dims=$(sips -g pixelWidth -g pixelHeight "$f" | awk '/pixel/{printf $2" "}')
            echo "  $(basename $f)  —  $dims"
          done

    artifacts:
      - apps/nato_alphabet/screenshots/*.png

  # ============================
  # NATO Alphabet - iOS
  # ============================
  nato-alphabet-ios:
    name: NATO Alphabet - iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - ios_credentials    # APP_STORE_CONNECT_KEY_IDENTIFIER, ISSUER_ID, PRIVATE_KEY

    # NO triggering block — iOS builds are MANUAL ONLY until first build succeeds.
    # To run: Codemagic dashboard → nato-alphabet-ios → Start build.

    scripts:
      - name: Get shared package dependencies
        script: |
          cd $CM_BUILD_DIR/packages/shared_app_core
          flutter pub get

      - name: Get app dependencies
        script: |
          cd $CM_BUILD_DIR/apps/nato_alphabet
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd $CM_BUILD_DIR/apps/nato_alphabet/ios
          pod install

      - name: Analyze
        script: |
          cd $CM_BUILD_DIR/apps/nato_alphabet
          flutter analyze --no-fatal-infos

      - name: Run unit and widget tests
        script: |
          cd $CM_BUILD_DIR/apps/nato_alphabet
          flutter test --coverage

      - name: Set up iOS signing
        script: |
          # ── 0. ENV VAR AUDIT ──────────────────────────────────────────────
          echo "=== ENV VAR AUDIT (names/lengths, no secret values) ==="
          echo "APP_STORE_CONNECT_KEY_IDENTIFIER  : ${APP_STORE_CONNECT_KEY_IDENTIFIER:+(SET, value=${APP_STORE_CONNECT_KEY_IDENTIFIER})}"
          echo "APP_STORE_CONNECT_ISSUER_ID       : ${APP_STORE_CONNECT_ISSUER_ID:+(SET, value=${APP_STORE_CONNECT_ISSUER_ID})}"
          echo "APP_STORE_CONNECT_PRIVATE_KEY len  : ${#APP_STORE_CONNECT_PRIVATE_KEY} chars"
          echo "CERTIFICATE_PRIVATE_KEY len        : ${#CERTIFICATE_PRIVATE_KEY} chars"
          if [ ${#APP_STORE_CONNECT_PRIVATE_KEY} -lt 10 ]; then
            echo "ERROR: APP_STORE_CONNECT_PRIVATE_KEY is empty or near-empty!"
          fi
          if [ ${#APP_STORE_CONNECT_ISSUER_ID} -lt 5 ]; then
            echo "ERROR: APP_STORE_CONNECT_ISSUER_ID is empty — check variable name in ios_credentials group!"
          fi
          if [ ${#CERTIFICATE_PRIVATE_KEY} -lt 10 ]; then
            echo "WARNING: CERTIFICATE_PRIVATE_KEY is empty — may cause certificate fetch failure!"
          fi

          # ── 1. KEYCHAIN INITIALIZE ────────────────────────────────────────
          echo ""
          echo "=== STEP 1: keychain initialize ==="
          keychain initialize
          echo "keychain initialize exit code: $?"

          # ── 2. FETCH SIGNING FILES ────────────────────────────────────────
          echo ""
          echo "=== STEP 2: app-store-connect fetch-signing-files ==="
          app-store-connect fetch-signing-files \
            com.foreverfree.natoalphabet \
            --type IOS_APP_STORE \
            --create \
            --verbose || { echo "fetch-signing-files FAILED with exit code $?"; exit 1; }
          echo "fetch-signing-files exit code: $?"

          # ── 3. SHOW FILES CREATED BY FETCH ────────────────────────────────
          echo ""
          echo "=== FILES AFTER FETCH (checking ALL known locations) ==="
          echo "-- ~/Library/Developer/Xcode/UserData/Certificates:"
          ls -la "$HOME/Library/Developer/Xcode/UserData/Certificates/" 2>/dev/null \
            || echo "  (directory not found)"
          echo "-- ~/Library/MobileDevice/Certificates:"
          ls -la "$HOME/Library/MobileDevice/Certificates/" 2>/dev/null \
            || echo "  (directory not found)"
          echo "-- ~/Library/Developer/Xcode/UserData/Provisioning Profiles:"
          ls -la "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/" 2>/dev/null \
            || echo "  (directory not found)"
          echo "-- ~/Library/MobileDevice/Provisioning Profiles:"
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" 2>/dev/null \
            || echo "  (directory not found)"

          # ── 4. ADD CERTIFICATES TO KEYCHAIN ───────────────────────────────
          echo ""
          echo "=== STEP 3: keychain add-certificates ==="
          keychain add-certificates
          echo "keychain add-certificates exit code: $?"

          # ── 5. SHOW CODE SIGNING IDENTITIES IN KEYCHAIN ───────────────────
          echo ""
          echo "=== IDENTITIES IN KEYCHAIN AFTER add-certificates ==="
          security find-identity -v -p codesigning \
            || echo "  security find-identity failed or found no identities"

          # ── 6. USE PROFILES ────────────────────────────────────────────────
          echo ""
          echo "=== STEP 4: xcode-project use-profiles ==="
          xcode-project use-profiles \
            --project $CM_BUILD_DIR/apps/nato_alphabet/ios/Runner.xcodeproj \
            --verbose || { echo "use-profiles FAILED with exit code $?"; exit 1; }
          echo "xcode-project use-profiles exit code: $?"

      - name: Verify signing setup
        script: |
          echo "=== PROVISIONING PROFILES: Xcode/UserData path ==="
          ls "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/" 2>/dev/null \
            && for f in "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/"*.mobileprovision; do
                 echo "--- $f ---"
                 security cms -D -i "$f" 2>/dev/null \
                   | grep -E "<key>Name|<key>UUID|<key>application-identifier" -A1 \
                   | head -12
               done \
            || echo "No profiles in Xcode/UserData path"

          echo ""
          echo "=== PROVISIONING PROFILES: MobileDevice path ==="
          ls "$HOME/Library/MobileDevice/Provisioning Profiles/" 2>/dev/null \
            && for f in "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision; do
                 echo "--- $f ---"
                 security cms -D -i "$f" 2>/dev/null \
                   | grep -E "<key>Name|<key>UUID|<key>application-identifier" -A1 \
                   | head -12
               done \
            || echo "No profiles in MobileDevice path"

          echo ""
          echo "=== CODE SIGNING SETTINGS IN project.pbxproj ==="
          grep -E "CODE_SIGN|DEVELOPMENT_TEAM|PROVISIONING_PROFILE" \
            $CM_BUILD_DIR/apps/nato_alphabet/ios/Runner.xcodeproj/project.pbxproj \
            | grep -v "^//"

          echo ""
          echo "=== EXPORT OPTIONS PLIST ==="
          cat /Users/builder/export_options.plist 2>/dev/null || echo "export_options.plist not found"

      - name: Build iOS IPA
        script: |
          cd $CM_BUILD_DIR/apps/nato_alphabet
          flutter build ipa --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - apps/nato_alphabet/build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        expire_build_submitted_for_review: true
