  # ============================
  # NATO Alphabet - iOS
  # ============================
  nato-alphabet-ios:
    name: NATO Alphabet - iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - ios_credentials    # APP_STORE_CONNECT_KEY_IDENTIFIER, ISSUER_ID, PRIVATE_KEY

    # NO triggering block — iOS builds are MANUAL ONLY until first build succeeds.
    # To run: Codemagic dashboard → nato-alphabet-ios → Start build.

    scripts:
      - name: Get shared package dependencies
        script: |
          cd $CM_BUILD_DIR/packages/shared_app_core
          flutter pub get

      - name: Get app dependencies
        script: |
          cd $CM_BUILD_DIR/apps/nato_alphabet
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd $CM_BUILD_DIR/apps/nato_alphabet/ios
          pod install

      - name: Analyze
        script: |
          cd $CM_BUILD_DIR/apps/nato_alphabet
          flutter analyze --no-fatal-infos

      - name: Run unit and widget tests
        script: |
          cd $CM_BUILD_DIR/apps/nato_alphabet
          flutter test --coverage

      - name: Set up iOS signing
        script: |
          app-store-connect fetch-signing-files \
            com.foreverfree.natoalphabet \
            --type IOS_APP_STORE \
            --create
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles \
            --workspace $CM_BUILD_DIR/apps/nato_alphabet/ios/Runner.xcworkspace

      - name: Build iOS IPA
        script: |
          cd $CM_BUILD_DIR/apps/nato_alphabet
          flutter build ipa --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - apps/nato_alphabet/build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        expire_build_submitted_for_review: true
