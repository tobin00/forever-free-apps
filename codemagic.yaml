workflows:
  # ============================
  # NATO Alphabet - Android
  # ============================
  nato-alphabet-android:
    name: NATO Alphabet - Android
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      java: 17
      groups:
        - android_credentials    # Keystore + Play Store creds + CM_API_KEY

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true

    scripts:
      # ------------------------------------------------------------------
      # PATH FILTER: cancel this build if nothing relevant changed.
      # Codemagic doesn't support path_patterns in triggering, so we do it
      # here. Requires CM_API_KEY in the android_credentials env group
      # (Codemagic UI → User Settings → Integrations → Codemagic API).
      # ------------------------------------------------------------------
      - name: Check if nato_alphabet changed
        script: |
          CHANGED=$(git diff --name-only "$CM_PREVIOUS_COMMIT" "$CM_COMMIT" 2>/dev/null \
                    || git diff --name-only HEAD~1 HEAD 2>/dev/null \
                    || echo "")

          if [ -z "$CHANGED" ]; then
            echo "Could not determine changed files (first push?) — proceeding."
            exit 0
          fi

          echo "Files changed in this push:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -qE "^(apps/nato_alphabet|packages/shared_app_core)/"; then
            echo "Relevant changes detected — proceeding with build."
          else
            echo "No changes to apps/nato_alphabet or packages/shared_app_core — cancelling build."
            curl -s -X POST \
              -H "x-auth-token: $CM_API_KEY" \
              "https://api.codemagic.io/builds/$CM_BUILD_ID/cancel"
            sleep 30
            exit 0
          fi

      - name: Set working directory
        script: |
          echo "APP_DIR=$CM_BUILD_DIR/apps/nato_alphabet" >> $CM_ENV

      - name: Get shared package dependencies
        script: |
          cd $CM_BUILD_DIR/packages/shared_app_core
          flutter pub get

      - name: Get app dependencies
        script: |
          cd $APP_DIR
          flutter pub get

      - name: Analyze
        script: |
          cd $APP_DIR
          flutter analyze --no-fatal-infos

      - name: Run unit and widget tests
        script: |
          cd $APP_DIR
          flutter test --coverage

      - name: Set up Android signing
        script: |
          cd $APP_DIR
          echo $CM_KEYSTORE | base64 --decode > $CM_BUILD_DIR/keystore.jks
          cat > android/key.properties <<EOF
          storeFile=$CM_BUILD_DIR/keystore.jks
          storePassword=$CM_KEYSTORE_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          keyPassword=$CM_KEY_PASSWORD
          EOF

      - name: Build Android App Bundle
        script: |
          cd $APP_DIR
          flutter build appbundle --release \
            --build-number=$PROJECT_BUILD_NUMBER

    artifacts:
      - apps/nato_alphabet/build/**/outputs/**/*.aab
      - apps/nato_alphabet/build/**/outputs/**/mapping.txt

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true

  # ============================
  # Country Flags - Android
  # ============================
  # NO triggering block — manual builds only until the app is ready.
  # To trigger: Codemagic dashboard → country-flags-android → Start build.
  # When the app is ready to ship, add the triggering block + path filter
  # (copy the pattern from nato-alphabet-android above).
  country-flags-android:
    name: Country Flags - Android
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      java: 17
      groups:
        - android_credentials

    scripts:
      - name: Set working directory
        script: |
          echo "APP_DIR=$CM_BUILD_DIR/apps/country_flags" >> $CM_ENV

      - name: Get shared package dependencies
        script: |
          cd $CM_BUILD_DIR/packages/shared_app_core
          flutter pub get

      - name: Get app dependencies
        script: |
          cd $APP_DIR
          flutter pub get

      - name: Analyze
        script: |
          cd $APP_DIR
          flutter analyze --no-fatal-infos

      - name: Run unit and widget tests
        script: |
          cd $APP_DIR
          flutter test --coverage

      - name: Set up Android signing
        script: |
          cd $APP_DIR
          echo $CM_KEYSTORE_COUNTRY_FLAGS | base64 --decode > $CM_BUILD_DIR/keystore_country_flags.jks
          cat > android/key.properties <<EOF
          storeFile=$CM_BUILD_DIR/keystore_country_flags.jks
          storePassword=$CM_KEYSTORE_PASSWORD_COUNTRY_FLAGS
          keyAlias=$CM_KEY_ALIAS_COUNTRY_FLAGS
          keyPassword=$CM_KEY_PASSWORD_COUNTRY_FLAGS
          EOF

      - name: Build Android App Bundle
        script: |
          cd $APP_DIR
          flutter build appbundle --release \
            --build-number=$PROJECT_BUILD_NUMBER

    artifacts:
      - apps/country_flags/build/**/outputs/**/*.aab
      - apps/country_flags/build/**/outputs/**/mapping.txt

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true

