workflows:
  # ============================
  # NATO Alphabet - Android
  # ============================
  nato-alphabet-android:
    name: NATO Alphabet - Android
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      java: 17
      groups:
        - android_credentials    # Keystore + Play Store creds

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
      # Note: path_patterns is not supported by Codemagic.
      # With a single app in the repo, every push to main triggers this workflow.

    scripts:
      # Navigate to the app directory
      - name: Set working directory
        script: |
          echo "APP_DIR=$CM_BUILD_DIR/apps/nato_alphabet" >> $CM_ENV

      # Get dependencies for shared package first
      - name: Get shared package dependencies
        script: |
          cd $CM_BUILD_DIR/packages/shared_app_core
          flutter pub get

      # Get app dependencies
      - name: Get app dependencies
        script: |
          cd $APP_DIR
          flutter pub get

      # Static analysis
      - name: Analyze
        script: |
          cd $APP_DIR
          flutter analyze --no-fatal-infos

      # Run unit and widget tests (integration tests run locally, not in CI)
      - name: Run unit and widget tests
        script: |
          cd $APP_DIR
          flutter test --coverage

      # Set up Android signing
      - name: Set up Android signing
        script: |
          cd $APP_DIR
          echo $CM_KEYSTORE | base64 --decode > $CM_BUILD_DIR/keystore.jks
          cat > android/key.properties <<EOF
          storeFile=$CM_BUILD_DIR/keystore.jks
          storePassword=$CM_KEYSTORE_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          keyPassword=$CM_KEY_PASSWORD
          EOF

      # Build release AAB (Android App Bundle)
      - name: Build Android App Bundle
        script: |
          cd $APP_DIR
          flutter build appbundle --release \
            --build-number=$PROJECT_BUILD_NUMBER

    artifacts:
      - apps/nato_alphabet/build/**/outputs/**/*.aab
      - apps/nato_alphabet/build/**/outputs/**/mapping.txt

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal    # Start with internal testing track
        submit_as_draft: true

  # ============================
  # NATO Alphabet - iOS
  # ============================
  nato-alphabet-ios:
    name: NATO Alphabet - iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: foreverfree_apple   # Name of the integration in Codemagic UI (Step 14.9)

    environment:
      flutter: stable
      xcode: latest    # Must be Xcode 16+ (Apple requirement as of April 2025)
      cocoapods: default
      groups:
        - ios_credentials    # APP_STORE_CONNECT_KEY_IDENTIFIER, ISSUER_ID, PRIVATE_KEY
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.foreverfree.natoalphabet

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true

    scripts:
      - name: Get shared package dependencies
        script: |
          cd $CM_BUILD_DIR/packages/shared_app_core
          flutter pub get

      - name: Get app dependencies
        script: |
          cd $CM_BUILD_DIR/apps/nato_alphabet
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd $CM_BUILD_DIR/apps/nato_alphabet/ios
          pod install

      - name: Analyze
        script: |
          cd $CM_BUILD_DIR/apps/nato_alphabet
          flutter analyze --no-fatal-infos

      - name: Run unit and widget tests
        script: |
          cd $CM_BUILD_DIR/apps/nato_alphabet
          flutter test --coverage

      - name: Build iOS IPA
        script: |
          cd $CM_BUILD_DIR/apps/nato_alphabet
          flutter build ipa --release \
            --build-number=$PROJECT_BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - apps/nato_alphabet/build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
